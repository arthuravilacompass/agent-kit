name: gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Provenance gate
        run: bash scripts/check-provenance.sh
      - name: Ceiling gate
        run: bash scripts/check-ceiling.sh
      - name: Inventory up-to-date
        run: python3 scripts/generate_inventory.py --check
      - name: Hook evals (tier 1)
        run: ./evals/run-evals.sh
      - name: Shellcheck
        # Versão pinada = a mesma usada localmente (shellcheck-py). O shellcheck
        # do apt no runner (0.9.x) diverge do local (0.11.x) e flagra regras
        # diferentes — o gate precisa ser determinístico entre os dois ambientes.
        run: |
          pip install shellcheck-py==0.11.0.1
          find plugins scripts evals tools -name '*.sh' -print0 | xargs -0 shellcheck
